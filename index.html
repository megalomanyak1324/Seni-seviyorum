<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mezuniyet Buketi</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#fff5f7;
padding:20px;
}

#bouquet{
font-size:50px;
min-height:120px;
margin:20px;
}

.flower{
font-size:45px;
cursor:pointer;
margin:10px;
}

#message{
display:none;
margin-top:30px;
font-size:20px;
color:#d63384;
}
</style>
</head>

<body>

<h1>Mezuniyet Buketin</h1>

<div id="bouquet"></div>

<div>
<span class="flower" onclick="addFlower('🌹')">🌹</span>
<span class="flower" onclick="addFlower('🌷')">🌷</span>
<span class="flower" onclick="addFlower('🌼')">🌼</span>
<span class="flower" onclick="addFlower('🌸')">🌸</span>
</div>

<div id="message">
<h2>Tebrikler Aşkım ❤️</h2>

<p>
Bugün senin günün.<br><br>

Bu buketteki her çiçek emeklerini ve verdiğin mücadeleyi temsil ediyor.<br><br>

Mezuniyetini kutluyorum. Seninle gurur duyuyorum.<br><br>

İyi ki varsın, iyi ki hayatımdasın.<br><br>

Seni çok seviyorum.
</p>
</div>

<script>
let count = 0;

function addFlower(flower){
document.getElementById("bouquet").innerHTML += flower;
count++;

if(count >= 8){
document.getElementById("message").style.display="block";
}
}
</script>

</body>
</html>
